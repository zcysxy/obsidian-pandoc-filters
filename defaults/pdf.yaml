---
## General options
standalone: true
embed-resources: true
from: markdown+tex_math_single_backslash+wikilinks_title_after_pipe+mark+autolink_bare_uris+pipe_tables
output-file: output.pdf
pdf-engine: pdflatex #! use xelatex to support CJK and unicode
highlight-style: tango
data-dir: ${.}/.. #! custom data directory, the directory containing the filters, defaults, and tempaltes folders
# toc: true

## Templates
# template: ${USERDATA}/custom.latex     #! custom template

## Biliography
# bibliography: #{USERDATA}/custom.bib #! custom bib file
# csl: ${USERDATA}/custom.csl #! custom csl

filters:
  - ${USERDATA}/filters/transclude.lua
  - ${USERDATA}/filters/image.lua
  - ${USERDATA}/filters/codeblock.lua
  - ${USERDATA}/filters/math.lua
  - ${USERDATA}/filters/callout.lua
  - ${USERDATA}/filters/checkbox.lua
  - ${USERDATA}/filters/shift_headings.lua
  - ${USERDATA}/filters/link.lua
  - ${USERDATA}/filters/div.lua
  - ${USERDATA}/filters/columns.lua
  - ${USERDATA}/filters/preamble.lua
  - ${USERDATA}/filters/highlight.lua
  # - mermaid-filter #! uncomment if you have mermaid-filter installed
  # - pandoc-crossref #! uncomment if you have pandoc-crossref installed
  - citeproc

metadata:
  CJKmainfont: SimSong
  CJKoptions: AutoFakeBold
  numbersections: true
  link-citations: true
  preamble-file: ${USERDATA}/../preamble.sty #! custom preamble file (e.g., for plugin obsidian-latex)
  #!NOTE: set in the frontmatter `preamble=false` to disable preamble file for a specific file
  # For pandoc-crossref
  # crossrefYaml: .config/pandoc/defaults/crossref.yaml #! path to crossref config yaml file, relative to current working directory of the Markdown file
  # For citeproc
  reference-section-title: References

variables:
  graphics: true
  geometry:
    - margin=1in
  natbiboptions: numbers,square
  biblatexoptions: style=numeric
  biblio-title: References
...
